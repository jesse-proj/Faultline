    <script>
        // --- GAME CONFIGURATIONS ---
                </script>
    <script src="simulations/supplyChain.js"></script>
    <script src="simulations/theYield.js"></script>
    <script src="simulations/theExtraction.js"></script>
    <script>
        const gamesConfig = {
            supplyChain: supplyChainConfig,
            theYield: theYieldConfig,
            theExtraction: theExtractionConfig
        };

        // --- ENGINE LOGIC ---
        let currentGame;
        let pStats = {};
        let currentStep = "1";

        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        
        function playSound(type) {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            
            if (type === 'click') {
                osc.type = 'square';
                osc.frequency.setValueAtTime(300, audioCtx.currentTime); 
                osc.frequency.exponentialRampToValueAtTime(150, audioCtx.currentTime + 0.1);
                gain.gain.setValueAtTime(0.3, audioCtx.currentTime); 
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.1);
            } else if (type === 'lose') {
                osc.type = 'square';
                osc.frequency.setValueAtTime(150, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(50, audioCtx.currentTime + 0.5); 
                gain.gain.setValueAtTime(0.5, audioCtx.currentTime); 
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.5);
            }
        }

        function initGame() {
            const urlParams = new URLSearchParams(window.location.search);
            const gameType = urlParams.get('game');
            
            if (gameType && gamesConfig[gameType]) {
                startSimulation(gameType);
            } else {
                document.getElementById('page-title').innerText = "Simulation Not Found";
                document.getElementById('game-narrative').innerText = "Please return to the interaction hub.";
            }
        }

        function startSimulation(type) {
            currentGame = gamesConfig[type];
            document.getElementById('page-title').innerText = currentGame.title;
            document.body.style.setProperty('--accent-red', currentGame.themeColor);
            
            pStats = { ...currentGame.initialStats };
            currentStep = "1";

            const statsContainer = document.getElementById('dynamic-stats');
            statsContainer.innerHTML = '';
            
            currentGame.statKeys.forEach(stat => {
                statsContainer.innerHTML += `
                    <div class="stat-item">
                        <span class="stat-label">${stat.name}</span>
                        <div class="progress-bg">
                            <div id="bar-${stat.id}" class="progress-fill" style="width: ${pStats[stat.id]}%; background-color: ${stat.color};"></div>
                        </div>
                    </div>
                `;
            });

            renderStoryNode();
        }

        function renderStoryNode() {
            const hasFailed = currentGame.statKeys.some(stat => pStats[stat.id] <= 0);
            if (hasFailed) return triggerGameOver();

            const node = currentGame.nodes[currentStep];
            if (!node) return triggerEnding({ text: "Simulation Complete." });

            if (node.isEnding) {
                return triggerEnding(node);
            }

            let headerStr = '';
            let contentStr = node.text;
            if (contentStr.startsWith('<strong')) {
                const endTag = '</strong>';
                const endIndex = contentStr.indexOf(endTag);
                if (endIndex !== -1) {
                    headerStr = `<div style="margin-bottom: 1rem; font-size: 1.25rem;">${contentStr.substring(0, endIndex + endTag.length)}</div>`;
                    contentStr = contentStr.substring(endIndex + endTag.length).trim();
                }
            }

            const imgContainer = document.getElementById('scenario-image-container');
            let imgHtml = '';
            if (node.image) {
                imgHtml = `<img src="${node.image}" alt="Scenario Image" style="width: 100%; height: 350px; object-fit: cover; border-radius: 4px; margin-bottom: 1.5rem; box-shadow: 0 4px 6px rgba(0,0,0,0.1);">`;
            }
            
            if (imgHtml) {
                imgContainer.innerHTML = imgHtml;
                imgContainer.style.display = 'block';
            } else {
                imgContainer.innerHTML = '';
                imgContainer.style.display = 'none';
            }
            
            document.getElementById('game-narrative').innerHTML = headerStr + contentStr;
            
            const optionsContainer = document.getElementById('game-options');
            optionsContainer.innerHTML = '';

            node.choices.forEach((choice) => {
                const btn = document.createElement('button');
                btn.className = 'game-btn';
                
                let impactStr = [];
                currentGame.statKeys.forEach(stat => {
                    if (choice.impact[stat.id] !== 0 && choice.impact[stat.id] !== undefined) {
                        impactStr.push(`${stat.name} ${choice.impact[stat.id] > 0 ? '+' : ''}${choice.impact[stat.id]}`);
                    }
                });
                
                btn.innerHTML = `<span>${choice.text}</span> <span style="color: ${currentGame.themeColor}">[ ${impactStr.join(' | ')} ]</span>`;
                btn.onclick = () => handleGameChoice(choice);
                optionsContainer.appendChild(btn);
            });
        }

        function handleGameChoice(choice) {
            playSound('click');
            
            currentGame.statKeys.forEach(stat => {
                if(choice.impact[stat.id] !== undefined) {
                    pStats[stat.id] = Math.min(100, Math.max(0, pStats[stat.id] + choice.impact[stat.id]));
                }
            });

            currentGame.statKeys.forEach(stat => {
                const bar = document.getElementById(`bar-${stat.id}`);
                bar.style.width = pStats[stat.id] + '%';
                bar.style.backgroundColor = pStats[stat.id] < 25 ? '#c45044' : stat.color;
            });

            currentStep = choice.nextNode;
            setTimeout(renderStoryNode, 400); 
        }

        function triggerGameOver() {
            playSound('lose');
            document.getElementById('game-narrative').innerHTML = `<strong style="color: #c45044; font-size: 1.5rem;">CRITICAL FAILURE</strong><p>System Collapse: You have run out of resources completely. You are forced onto the streets. The colonial legacy simply changed its name.</p>`;
            document.getElementById('game-options').innerHTML = `<button class="btn-primary" style="justify-content:center; width: 200px; margin: 0 auto; background-color: ${currentGame.themeColor}; border: none; color: white;" onclick="window.location.reload()">Restart Simulation</button>`;
        }

        function triggerEnding(node) {
            // Clear the image and stat bars on the ending screen
            const imgContainer = document.getElementById('scenario-image-container');
            imgContainer.innerHTML = '';
            imgContainer.style.display = 'none';
            document.getElementById('dynamic-stats').style.display = 'none';

            // Split the ending title (first sentence) from the body text
            const fullText = node.text;
            const firstDotIndex = fullText.indexOf('. ');
            let titleHtml = '';
            let bodyHtml = fullText;
            if (firstDotIndex !== -1) {
                const title = fullText.substring(0, firstDotIndex + 1);
                const body = fullText.substring(firstDotIndex + 2);
                titleHtml = `<strong style="color: ${currentGame.themeColor}; font-size: 1.6rem; display: block; margin-bottom: 1rem;">${title}</strong>`;
                bodyHtml = body;
            }
            document.getElementById('game-narrative').innerHTML = titleHtml + `<p style="font-size: 1.1rem; line-height: 1.9;">${bodyHtml}</p>`;
            document.getElementById('game-options').innerHTML = `<button class="btn-primary" style="justify-content:center; width: 200px; margin: 0 auto; background-color: ${currentGame.themeColor}; border: none; color: white;" onclick="window.location.href='interact.html'">Back to Interact</button>`;
        }

        document.addEventListener('DOMContentLoaded', initGame);
</script>
